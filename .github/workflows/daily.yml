name: Daily AI Radar

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily note
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_RADAR_DAILY_MODEL: ${{ vars.AI_RADAR_DAILY_MODEL || vars.AI_RADAR_MODEL || 'gpt-4.1-mini' }}
        run: python src/ai_radar/main.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notes/daily data/items data/run-summary data/cache.json inbox/links.md inbox/processed.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update daily ai radar"
            git push
          fi
