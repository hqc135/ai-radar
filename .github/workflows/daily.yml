name: Daily AI Radar

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Lookback window in hours"
        required: false
        default: "36"
      ignore_cache:
        description: "Rebuild from fetched candidates even if URLs are already cached"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-ai-radar
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}${DEEPSEEK_API_KEY}" ]; then
            echo "::error::Set DEEPSEEK_API_KEY or OPENAI_API_KEY in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Generate daily note
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.deepseek.com' }}
          AI_RADAR_DAILY_MODEL: ${{ vars.AI_RADAR_DAILY_MODEL || vars.AI_RADAR_MODEL || 'deepseek-v4-flash' }}
          AI_RADAR_DISABLE_THINKING: ${{ vars.AI_RADAR_DISABLE_THINKING || 'true' }}
          AI_RADAR_HOURS: ${{ inputs.hours || '36' }}
          AI_RADAR_IGNORE_CACHE: ${{ inputs.ignore_cache || false }}
        run: |
          args=(--hours "$AI_RADAR_HOURS")
          if [ "$AI_RADAR_IGNORE_CACHE" = "true" ]; then
            args+=(--ignore-cache)
          fi
          python src/ai_radar/main.py "${args[@]}"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add notes/daily data/items data/run-summary data/cache.json inbox/links.md
          if [ -f inbox/processed.md ]; then
            git add inbox/processed.md
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update daily ai radar"
            git push
          fi

      - name: Build Pages site
        run: python scripts/build_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
